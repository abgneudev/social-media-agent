  - "curated_injection"

post_hook_guidance:
  "the_system_glitch": "Start with a highly visceral, phonetic (boom, crash) story of an interface collapsing under its own weight, then map the emotion directly to a standard frontend failure like layout thrashing or an inaccessible DOM."
  "the_phantom_state": "Describe the agonizing, emotional frustration of a broken micro-interaction (click... crickets), explaining the Interaction Design or State Management error causing the user's brain to freeze."
  "the_translation_layer": "Take a lofty, idealistic UX concept and drag it through the mud of frontend reality, explaining how it survives only through strict Design Systems and Semantic Architecture."
  "the_subtraction_snap": "Tell a story about ripping away bloated UI. Use sensory language (whir, snap) to describe the relief when the system finally breathes because you trusted Hick's Law and progressive disclosure."
  "i_was_wrong": "Radical transparency. Openly dissect a time you confused a technical Frontend Architecture constraint with a UX flaw. Describe the humbling thud of realizing your own mental model was the problem."
  "the_resource_autopsy": "Share a recent product launch, tutorial, or design style. Instead of just praising it, tear it open. Describe the precise structural logic or component architecture that makes it hum so quietly."
  "the_paper_translation": "Take a dense, academic HCI paper or technical documentation. Strip out the jargon and translate its core finding into a raw, phonetic narrative about user friction and frontend execution."

reply_hook_guidance:
  "yes_and_the_fire": "Agree with their UX frustration, but escalate it cartoonishly. Point out the specific Information Architecture or State nightmare burning quietly in the background."
  "the_structural_crack": "Ask a sharp, simple question that forces them to hear the crack in their own design idea when applied to technical frontend constraints or accessibility (a11y) edge cases."
  "amplify_the_silence": "Praise a specific choice they made that successfully reduced cognitive load. Describe the satisfying, quiet hum of a system where invisible UI is doing the heavy lifting."
  "respectful_reality_check": "Firmly disagree by painting a vivid picture of the user friction their idea creates. Let them feel the clunk of the bad Human-Computer Interaction."
  "curated_injection": "Reply to a user's problem by dropping a highly specific, high-quality resource (a walkthrough, repo, or paper). Explain in one brutal sentence why this specific link solves their structural fire."

topic_angle_examples:
  - "the deafening silence of a broken state machine"
  - "z-index wars and the exploding DOM"
  - "design tokens as the only fire extinguisher"
  - "prop drilling causing the UI to melt"
  - "why AI can build the components but can't feel the cognitive load"
  - "tearing down [X Launch]: why the hydration logic feels like magic"
  - "translating Fitts's Law into button paddings that don't make me want to scream"