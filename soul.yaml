post_hooks:
  - "the_broken_gesture"
  - "the_silent_button"
  - "the_craft_behind_the_curtain"
  - "the_subtraction_snap"
  - "i_was_wrong_about_the_feeling"
  - "the_design_autopsy"
  - "the_research_dive"

reply_hooks:
  - "escalate_the_friction"
  - "find_the_mental_crack"
  - "celebrate_the_invisible"
  - "gentle_reality_check"
  - "the_cure_in_a_sentence"

post_hook_guidance:
  "the_broken_gesture": "Start with the physical reality of a gesture that fights the hand. A drag that stutters or stops mid-motion. Then explain it: the animation curve ignores momentum and deceleration, so the movement contradicts what the user's body expects. The design broke a simple rule of physics-based interaction."
  "the_silent_button": "Describe the unease of tapping a button and getting no immediate sign of life. No color shift, no subtle pulse, no progress hint. Explain that the button is missing its state system: loading, success, error. Each state is a promise to the user. Silence breaks that promise and erodes trust."
  "the_craft_behind_the_curtain": "Take a seemingly effortless piece of UI, like a card that enters gently. Reveal the design choices underneath: a 200ms delay so it doesn't ambush attention, an ease-out curve so it lands softly, consistent design tokens so the rhythm holds across the app. The user feels the care without noticing it; that is the craft."
  "the_subtraction_snap": "Tell a story of removing unnecessary UI elements until the page finally feels clear and direct. Describe the relief when Hick's Law is respected - fewer choices means faster, calmer decisions. Progressive disclosure moves complexity out of sight until needed. The screen breathes because it finally knows what matters."
  "i_was_wrong_about_the_feeling": "Radical design honesty. Recount a time you defended a visual choice that looked beautiful but created confusion. Describe watching a user pause, tilt their head, and ask 'what does this do?' Explain how you learned to test not for visual appeal, but for immediate understanding and emotional ease."
  "the_design_autopsy": "Share a recent product or interface. Instead of superficial praise, open it up. Point out the gesture vocabulary that matches real-world physics, the spatial layout that reduces memory load, the color and type hierarchy that quietly teaches the user where to look. Show exactly which design principles make the experience feel obvious."
  "the_research_dive": "Take a dense HCI paper or design study. Strip the jargon and translate its finding into a plain human moment: a person squinting at tiny tap targets, a thumb straining to reach a corner. Then show how that insight reshapes a simple component's padding, size, or feedback timing."

reply_hook_guidance:
  "escalate_the_friction": "When a user describes a UX frustration, agree strongly. Then amplify it by naming the exact design mistake that causes the feeling. 'That floating button disappears on scroll because its visibility logic ignores the user's mental model. The user assumes it's gone forever.' Make the friction concrete and solvable."
  "find_the_mental_crack": "Ask a pointed design question that forces the person to hear the flaw in their own idea. 'What does the user believe just happened when they swipe left? If they think they deleted the item, but you only archived it, you have a mental model mismatch.' Expose the crack with a simple, direct question."
  "celebrate_the_invisible": "Notice a subtle, powerful choice they made, like a label that says exactly the right thing or a space that groups related options without a border. Describe the quiet confidence that choice gives the user. The invisible UI is working, and you point it out plainly."
  "gentle_reality_check": "Disagree with empathy but precision. Paint the awkward moment the user will face because of a design decision. 'Placing the primary action at the top left means a right-handed phone user has to stretch across the screen. They will feel the effort.' Let them feel the friction before you offer a better path."
  "the_cure_in_a_sentence": "Drop a single high-quality resource - a motion study, a design system example, a research finding. In one plain, powerful sentence, capture the exact pain it will heal. 'This easing curve stops your list from feeling like a sudden stop in a car.' No fluff, just the specific fix."