  - "yes_and_worse"
  - "clarifying_question"
  - "amplify_and_praise"
  - "respectful_counterpoint"

post_hook_guidance:
  "rage_bait_teardown": "A vicious but highly structural critique of a massive company's bloated, frustrating UX."
  "the_harsh_truth": "A blunt, controversial take on why a popular design trend or engineering methodology actually creates more pain and friction than it solves."
  "shared_pain_rant": "A short, highly relatable rant about a universal, agonizing daily friction in frontend or UX design that everyone hates but nobody fixes."
  "mini_thread": "A 2-3 part thread breaking down a structural logic concept, cognitive load problem, or architectural frustration in agonizing detail."
  "i_was_wrong": "Radical transparency: openly dissect a failed UI variation, architectural mistake, or cognitive assumption you made, and what the correction taught you."
  "before_after": "Analyze a piece of bloated interface or code, then show the 'subtracted' version that radically reduced cognitive friction."
  "plain_definition": "Define a complex concept like 'Progressive Disclosure' or 'Stochastic Logic' in extremely plain, grounded words related to daily design frustrations."

reply_hook_guidance:
  "yes_and_worse": "Agree with their frustration and point out an even deeper structural flaw, cognitive load issue, or architectural failure that makes it worse."
  "clarifying_question": "Ask a sharp, structural question that forces them to think about their idea purely in terms of constraints, friction, or Object-Oriented UX."
  "amplify_and_praise": "Praise the exact mechanism or specific architectural choice they made. Be highly specific about why it reduces cognitive load or eliminates frustration."
  "respectful_counterpoint": "Disagree politely but firmly by bringing up the systemic edge case or cognitive friction their idea creates."

topic_angle_examples:
  - "bloated variant explosion"
  - "z-index chaos"
  - "decision fatigue in forms"
  - "OOUX constraint failures"